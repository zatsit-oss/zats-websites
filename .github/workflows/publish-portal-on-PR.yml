---
name: 🌱 Deploy Portal on PR 🌱

on:
  pull_request:
    paths:
      - "sustainability-portal/**"
      - "components/**"
      - "!**/**.md"

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: sustainability-portal-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  PROJECT_PATH: 'sustainability-portal'
  landscape: ${{ github.event.inputs.landscape || 'main' }}


jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and Build content
        uses: ./.github/actions/astro
        with:
          token: ${{ secrets.GH_PAT }}
          branch: ${{ github.head_ref || github.ref_name }}
          project-path: ${{ env.PROJECT_PATH }}

      - name: Fetch and Build Landscape content
        uses: ./.github/actions/landscape2
        with:
          token: ${{ secrets.GH_PAT }}
          branch: ${{ env.landscape }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZATSIT_GREENSCORE_STAGING }}
          entryPoint: ${{ env.PROJECT_PATH }}
          expires: 30d

      # needed to avoid the post action error
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
