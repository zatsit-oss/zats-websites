---
name: Fetch and build Greenscore
description: Fetch and build the greenscore
inputs:
  token:
    description: 'The token to use for fetching the repository'
    required: true
  branch:
    description: 'The branch to fetch for greenscore content'
    required: false
    default: 'main'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: landing-page/package-lock.json

    - name: Install dependencies
      shell: bash
      run: |
        cd landing-page/
        npm install

    - name: Build project
      shell: bash
      run: |
        cd landing-page/
        npm run build

    - name: Copy build files
      shell: bash
      run: |
        mkdir -p public/apigreenscore
        cp -r landing-page/dist/* public/apigreenscore/
