---
name: Build Astro project
description: Build an Astro project from the monorepo
inputs:
  token:
    description: 'The token to use for fetching the repository'
    required: true
  branch:
    description: 'The branch to fetch for greenscore content'
    required: false
    default: 'main'
  project-path:
    description: 'The folder path to work with'
    required: true
  command-prefix:
    description: 'The command prefix to use for the build command'
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        # Pinned: Node 22.23.0 (security release) regressed keep-alive socket reuse,
        # causing false "Premature close" errors against googleapis.com that break the
        # Firebase deploy (firebase-tools#10692, nodejs/node#63989). 22.22.3 is the last
        # known-good version. Bump back to '22' once the upstream regression is fixed.
        node-version: '22.22.3'
        cache: 'npm'
        cache-dependency-path: ${{ inputs.project-path }}/package-lock.json

    - name: Install dependencies
      shell: bash
      run: |
        cd ${{ inputs.project-path }}/
        npm ci

    - name: Build project
      shell: bash
      env:
        COMMAND_PREFIX: ${{ inputs.command-prefix }}
      run: |
        cd ${{ inputs.project-path }}/
        eval "${COMMAND_PREFIX:+$COMMAND_PREFIX && }npm run build"
